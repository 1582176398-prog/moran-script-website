    <script>
        // 添加UI音效
        document.addEventListener('DOMContentLoaded', () => {
            // audioManager 已在 audio.js 中自动创建为 window.audioManager
            
            // 首次点击时初始化音频上下文
            const initAudioOnFirstClick = async () => {
                if (window.audioManager) {
                    await window.audioManager.initAudioContext();
                    
                    // 音频初始化完成后，如果有游戏实例且有当前场景，播放音乐
                    if (window.game && game.currentScene && window.game.initAudioAndPlay) {
                        game.initAudioAndPlay();
                    }
                }
                // 移除这个监听器，只需要初始化一次
                document.removeEventListener('click', initAudioOnFirstClick);
            };
            document.addEventListener('click', initAudioOnFirstClick);
            
            // 为所有按钮添加点击音效
            document.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (window.audioManager) {
                        audioManager.playSFX('click');
                    }
                });
                
                // 添加悬停音效
                btn.addEventListener('mouseenter', () => {
                    if (window.audioManager) {
                        audioManager.playSFX('hover');
                    }
                });
            });

            // 音量控制
            const bgmSlider = document.getElementById('bgm-volume');
            const seSlider = document.getElementById('se-volume');
            
            if (bgmSlider) {
                bgmSlider.addEventListener('input', (e) => {
                    if (window.audioManager) {
                        audioManager.setVolume('mp3', e.target.value / 100);
                    }
                });
            }
            
            if (seSlider) {
                seSlider.addEventListener('input', (e) => {
                    if (window.audioManager) {
                        audioManager.setVolume('sfx', e.target.value / 100);
                    }
                });
            }
            
            // 开发者面板事件
            const devRoute = document.getElementById('dev-route');
            const devChapter = document.getElementById('dev-chapter');
            
            if (devRoute) {
                devRoute.addEventListener('change', () => {
                    if (window.game) game.updateDevSceneList();
                });
            }
            if (devChapter) {
                devChapter.addEventListener('change', () => {
                    if (window.game) game.updateDevSceneList();
                });
            }
        });
    </script>
